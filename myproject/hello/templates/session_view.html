{% extends "base.html" %}

{% block content %}
<section class="pt-32 pb-20 px-6 text-center">
    <div class="glass p-12 rounded-[40px] max-w-2xl mx-auto border-white/10 relative overflow-hidden">
        <div class="absolute -top-10 -left-10 w-32 h-32 bg-purple-500/20 rounded-full blur-3xl"></div>
        
        <h1 class="text-4xl font-extrabold mb-4">Tracking Session</h1>
        <p class="text-gray-400 mb-8">Data ini disimpan aman di sisi server TechGroup.</p>
        
        <div class="text-7xl font-black text-gradient mb-4">
            {{ count }}
        </div>
        <p class="text-blue-400 font-bold tracking-widest uppercase text-xs">Total Kunjungan Anda</p>
    </div>
</section>
{% endblock %}
